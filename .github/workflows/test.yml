name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Formatting
        run: cargo fmt --check --message-format=human

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
