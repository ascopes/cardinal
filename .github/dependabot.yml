version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      timezone: Europe/London
    open-pull-requests-limit: 10
    assignees:
      - ascopes
    # Group multiple changes in one PR.
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      timezone: Europe/London
    open-pull-requests-limit: 10
    target-branch: main
    assignees:
      - ascopes

